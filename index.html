<!DOCTYPE html>
<html lang="bg">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ShiftFlow — Влез</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="manifest.json" />
  <meta name="theme-color" content="#0d1117" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet" />
</head>
<body class="login-page">

  <div class="bg-orbs">
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <div class="login-wrapper">
    <div class="login-card glass-card">
      <div class="login-logo">
        <span class="logo-icon">⏱</span>
        <span class="logo-text">ShiftFlow</span>
      </div>
      <p class="login-sub">Управление на работни смени</p>

      <div id="login-error" class="alert alert-error hidden"></div>

      <div class="form-group">
        <label class="form-label">Потребителско име</label>
        <input type="text" id="username" class="form-input" placeholder="manager1 / employee1" autocomplete="username" />
      </div>

      <div class="form-group">
        <label class="form-label">Парола</label>
        <div class="input-with-icon">
          <input type="password" id="password" class="form-input" placeholder="••••••••" autocomplete="current-password" />
          <button type="button" class="toggle-pass" onclick="togglePass()">👁</button>
        </div>
      </div>

      <button class="btn btn-primary btn-full" id="login-btn" onclick="handleLogin()">
        <span id="login-btn-text">Вход</span>
        <span id="login-spinner" class="spinner hidden"></span>
      </button>

      <p class="login-hint">
        Мениджър: <code>manager1 / 1234</code><br/>
        Служители: <code>emp1</code> · <code>emp2</code> · <code>emp3</code> · <code>emp4</code> / <code>1234</code>
      </p>
    </div>
  </div>

  <script src="supabase.js"></script>
  <script src="app.js"></script>
  <script>
    document.getElementById('password').addEventListener('keypress', e => {
      if (e.key === 'Enter') handleLogin();
    });
    function togglePass() {
      const p = document.getElementById('password');
      p.type = p.type === 'password' ? 'text' : 'password';
    }
  </script>
</body>
</html>
